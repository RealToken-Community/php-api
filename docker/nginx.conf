#user www-data;
worker_processes 4;
pid /run/nginx.pid;

events {
    worker_connections 256;
    multi_accept on;
    use epoll;
}

http {
    # Block spammers
    include /etc/nginx/blockips.conf;
    
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 15;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    #access_log off;
    #error_log off;
    gzip on;
    gzip_disable "msie6";
    gzip_types application/json application/javascript text/plain;
    gzip_min_length 256;
    open_file_cache max=100;
    client_body_temp_path /tmp 1 2;
    client_body_buffer_size 256k;
    client_body_in_file_only off;
    log_not_found off;
    client_body_timeout 15;
    client_header_timeout 15;
    send_timeout 15;

    # OLD Config
#    real_ip_header X-Forwarded-For;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Docker
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 172.18.0.0/24;

    # Cloudflare
    set_real_ip_from 104.16.0.0/12;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 198.41.128.0/17;

    # Tmp rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:1m rate=3r/s;

    log_format api_line
      '$time_iso8601 | $remote_addr | $status | '
      '$request_method $request_uri | '
      'rfr=$http_referer | '
      'ua=$http_user_agent | '
      'rt=$request_time | '
      'bytes=$body_bytes_sent';

    server {
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        client_max_body_size 100M;
        server_name localhost;
        root /var/www/html/public;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header Referrer-Policy no-referrer;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Tmp rate limiting
        limit_req zone=api_limit burst=10 nodelay;

        #location / {
        #    try_files $uri @rewriteapp;
        #}

        location / {
            try_files $uri /index.php$is_args$args;
        }

        #location @rewriteapp {
        #    rewrite ^(.*)$ /index.php/$1 last;
        #}

        location ~ ^/index\.php(/|$) {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS off;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_busy_buffers_size 64k;

            fastcgi_read_timeout 60;
            fastcgi_send_timeout 60;
            fastcgi_connect_timeout 10;
        }

        error_log /var/log/nginx/realt-api_error.log warn;
        access_log /var/log/nginx/realt-api_access.log api_line;

        location ~ /\.(env|git|ht|svn) {
            deny all;
        }

        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$ ) {
            return 405;
        }
    }
}
